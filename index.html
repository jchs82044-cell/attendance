<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>온라인 출석부</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }
    body { background-color: #f4f6f8; color: #333; padding: 20px; display: flex; justify-content: center; }
    .container { width: 100%; max-width: 800px; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08); }
    
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #edf2f7; padding-bottom: 15px; }
    h1 { font-size: 1.4rem; color: #1a252f; }
    
    /* 버튼 스타일 */
    button { padding: 9px 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
    .btn-submit { background-color: #3182ce; color: white; width: 100%; margin-top: 10px; }
    .btn-submit:hover { background-color: #2b6cb0; }
    .btn-admin { background-color: #4a5568; color: white; }
    .btn-admin:hover { background-color: #2d3748; }
    .btn-lock { background-color: #e53e3e; color: white; }
    .btn-lock:hover { background-color: #c53030; }

    /* 입력 폼 */
    .form-group { background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #e2e8f0; }
    .form-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
    input, select { padding: 10px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 0.95rem; }
    
    /* 선택 상자 비율 조정 */
    .select-student { flex: 2 1 180px; }
    .select-status { flex: 1 1 100px; }
    .input-reason { flex: 1 1 100%; }

    /* 관리자 영역 */
    #adminPanel { display: none; margin-top: 20px; border-top: 2px dashed #e2e8f0; padding-top: 20px; }
    
    /* 테이블 */
    .table-container { overflow-x: auto; margin-top: 10px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; font-size: 0.9rem; }
    th { background-color: #edf2f7; color: #4a5568; }

    /* 뱃지 */
    .badge { padding: 3px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
    .badge-present { background: #c6f6d5; color: #22543d; }
    .badge-absent { background: #fed7d7; color: #742a2a; }
    .badge-late { background: #feebc8; color: #744210; }

    .btn-delete { background-color: #e53e3e; color: white; padding: 4px 8px; font-size: 0.75rem; }
    .actions { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
    .btn-export { background-color: #38a169; color: white; }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>📋 온라인 출석 제출 시스템</h1>
      <button id="adminToggleBtn" class="btn-admin" onclick="toggleAdminMode()">🔒 선생님 로그인</button>
    </div>

    <div class="form-group">
      <h3 style="margin-bottom: 12px; font-size: 1.05rem; color: #2d3748;">✏️ 출석 정보 작성</h3>
      <div class="form-row">
        <select id="studentSelect" class="select-student">
          <option value="">-- 이름 선택 --</option>
        </select>
        
        <select id="attendanceStatus" class="select-status">
          <option value="출석">출석</option>
          <option value="결석">결석</option>
          <option value="지각">지각</option>
          <option value="조퇴">조퇴</option>
        </select>
      </div>
      <div class="form-row">
        <input type="text" id="disqualifyReason" class="input-reason" placeholder="사유 / 결격 사유 (선택 입력)">
      </div>
      <button class="btn-submit" onclick="addRecord()">출석 제출하기</button>
    </div>

    <div id="adminPanel">
      <h3 style="color: #2b6cb0; margin-bottom: 10px;">🔓 관리자 전용 - 전체 출석 현황</h3>
      
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>일시</th>
              <th>이름</th>
              <th>상태</th>
              <th>결격 및 제출 사유</th>
              <th>관리</th>
            </tr>
          </thead>
          <tbody id="attendanceList">
            </tbody>
        </table>
      </div>

      <div class="actions">
        <button class="btn-export" onclick="exportToCSV()">Excel/CSV로 내보내기</button>
        <button class="btn-delete" onclick="clearAllData()">전체 데이터 초기화</button>
      </div>
    </div>
  </div>

  <script>
    // -------------------------------------------------------------
    // 📝 1. 학생 명단 설정 (여기서 이름들을 수정/추가하세요)
    // -------------------------------------------------------------
    const STUDENT_LIST = [
      "김동범", "김보윤", "김영현", "김용연", "김지연",
      "김태성", "김태연", “나도연", "박건호", "박시율", ”박재민“ , ”박지민“ , ”손채민“ , ”신지윤“ , ”신희제“ , ”양현진“ , ”옥채은“ , ”원서윤“ , ”윤관열“ , ”이민기“ , ”이승근“ , ”이재서“ , ”이준서“ , ”장근우“ , ”정준희“ , ”정혜원“ , ”지서준“ , ”하은수“ , ”홍석진“   ];

    // 🔑 2. 선생님 관리자 비밀번호
    const ADMIN_PASSWORD = "prototype1!"; 
    
    let isAdminLoggedIn = false;

    // 페이지 로드 시 학생 목록 채우기
    document.addEventListener("DOMContentLoaded", () => {
      initStudentSelect();
    });

    // 학생 명단을 <select> 옵션에 등록하는 함수
    function initStudentSelect() {
      const select = document.getElementById("studentSelect");
      
      // 이름순으로 정렬
      STUDENT_LIST.sort().forEach(name => {
        const option = document.createElement("option");
        option.value = name;
        option.textContent = name;
        select.appendChild(option);
      });
    }

    // 관리자 모드 토글 (비밀번호 확인)
    function toggleAdminMode() {
      const toggleBtn = document.getElementById("adminToggleBtn");
      const adminPanel = document.getElementById("adminPanel");

      if (isAdminLoggedIn) {
        isAdminLoggedIn = false;
        adminPanel.style.display = "none";
        toggleBtn.innerText = "🔒 선생님 로그인";
        toggleBtn.className = "btn-admin";
      } else {
        const inputPw = prompt("선생님 전용 관리자 암호를 입력하세요:");
        if (inputPw === ADMIN_PASSWORD) {
          isAdminLoggedIn = true;
          adminPanel.style.display = "block";
          toggleBtn.innerText = "🔓 관리자 잠그기";
          toggleBtn.className = "btn-lock";
          renderRecords();
        } else if (inputPw !== null) {
          alert("비밀번호가 올바르지 않습니다.");
        }
      }
    }

    // 출석 등록 처리
    function addRecord() {
      const studentSelect = document.getElementById("studentSelect");
      const statusInput = document.getElementById("attendanceStatus");
      const reasonInput = document.getElementById("disqualifyReason");

      const name = studentSelect.value;
      const status = statusInput.value;
      const reason = reasonInput.value.trim() || "-";

      if (!name) {
        alert("학생 이름을 목록에서 선택해 주세요.");
        return;
      }

      const now = new Date();
      const timestamp = now.toLocaleDateString('ko-KR') + ' ' + now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });

      const record = {
        id: Date.now(),
        timestamp,
        name,
        status,
        reason
      };

      let records = getStoredRecords();
      records.push(record);
      localStorage.setItem("attendanceRecords", JSON.stringify(records));

      // 선택 창 초기화
      studentSelect.value = "";
      reasonInput.value = "";

      alert(`${name} 학생의 출석이 등록되었습니다.`);

      if (isAdminLoggedIn) {
        renderRecords();
      }
    }

    function getStoredRecords() {
      const stored = localStorage.getItem("attendanceRecords");
      return stored ? JSON.parse(stored) : [];
    }

    // 목록 출력
    function renderRecords() {
      if (!isAdminLoggedIn) return;

      const listElement = document.getElementById("attendanceList");
      const records = getStoredRecords();

      listElement.innerHTML = "";

      if (records.length === 0) {
        listElement.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#a0aec0;">제출된 출석 정보가 없습니다.</td></tr>`;
        return;
      }

      records.forEach(record => {
        let badgeClass = "badge-present";
        if (record.status === "결석") badgeClass = "badge-absent";
        if (record.status === "지각" || record.status === "조퇴") badgeClass = "badge-late";

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${record.timestamp}</td>
          <td><strong>${record.name}</strong></td>
          <td><span class="badge ${badgeClass}">${record.status}</span></td>
          <td>${record.reason}</td>
          <td><button class="btn-delete" onclick="deleteRecord(${record.id})">삭제</button></td>
        `;
        listElement.appendChild(tr);
      });
    }

    function deleteRecord(id) {
      if (confirm("해당 기록을 삭제하시겠습니까?")) {
        let records = getStoredRecords();
        records = records.filter(r => r.id !== id);
        localStorage.setItem("attendanceRecords", JSON.stringify(records));
        renderRecords();
      }
    }

    function clearAllData() {
      if (confirm("경고: 모든 출석 데이터가 삭제됩니다. 계속 진행하시겠습니까?")) {
        localStorage.removeItem("attendanceRecords");
        renderRecords();
      }
    }

    function exportToCSV() {
      const records = getStoredRecords();
      if (records.length === 0) {
        alert("내보낼 데이터가 없습니다.");
        return;
      }

      let csvContent = "\uFEFF일시,이름,상태,사유\n";
      records.forEach(r => {
        csvContent += `"${r.timestamp}","${r.name}","${r.status}","${r.reason}"\n`;
      });

      const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.setAttribute("href", url);
      link.setAttribute("download", `출석부_기록_${new Date().toISOString().slice(0,10)}.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  </script>
</body>
</html>
