<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>온라인 출석부</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; text-align: center; }
        select, input, button { padding: 10px; margin: 10px; width: 80%; font-size: 16px; }
        button { background-color: #2ea44f; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #2c974b; }
        #log { margin-top: 20px; text-align: left; background: #f6f8fa; padding: 15px; border-radius: 5px; }
        .present { color: green; font-weight: bold; }
        .absent { color: red; }
    </style>
</head>
<body>

    <h2>📋 2-7반 온라인 출석부</h2>
    
    <input type="password" id="password" placeholder="출석 비밀번호 입력">
    <br>
    
    <label for="memberSelect">이름을 선택하세요:</label>
    <select id="memberSelect">
        <option value="">-- 명단 로딩 중 --</option>
    </select>
    <br>
    
    <button onclick="checkAttendance()">출석 체크하기</button>

    <div id="log">
        <h3>📅 오늘 출석 현황</h3>
        <ul id="list"></ul>
    </div>

    <script>
        // 본인의 깃허브 정보로 변경하세요
        const OWNER = 'jchs82044-cell'; 
        const REPO = 'attendance';
        const ATTENDANCE_FILE = 'attendance.json';
        const MEMBERS_FILE = 'student.json';

        // 1. 학생들이 입력할 우리 반 공통 비밀번호 설정
        const CLASS_PASSWORD = "prototypechemistry"; 

        // 2. 본인의 GitHub Personal Access Token을 'Base64'로 인코딩해서 여기에 넣으세요.
        // (주의: 토큰을 그대로 넣으면 깃허브가 감지해서 토큰을 자동 삭제합니다!)
        // 변환 방법: 브라우저 개발자 도구(F12) 콘솔 창에 btoa('ghp_내토큰...') 입력 후 나온 값을 넣으세요.
        const ENCODED_GITHUB_TOKEN = 'Z2l0aHViX3BhdF8xMUJaUVVWQUkwZFZvOEhjVnNzMnpGX1lMZGpPcERCSzNHY1pmZ3pFSEdKck5nQjVxYzZmWHBnQUVHYVZxaGJMVm1ZWk9RVTIyTEh1ZWxlZHFU';

        let baseApiUrl = `https://api.github.com/repos/${OWNER}/${REPO}/contents/`;

        // 깃허브 파일 내용을 가져와서 텍스트로 디코딩하는 함수
        async function fetchGitHubFile(fileName) {
            const response = await fetch(baseApiUrl + fileName);
            if (!response.ok) throw new Error(`${fileName} 로드 실패`);
            const data = await response.json();
            const content = decodeURIComponent(atob(data.content).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return { data: JSON.parse(content), sha: data.sha };
        }

        // 초기 데이터 로드 (명단과 출석 현황을 동시에 가져옴)
        async function init() {
            try {
                const membersObj = await fetchGitHubFile(MEMBERS_FILE);
                const attendanceObj = await fetchGitHubFile(ATTENDANCE_FILE);
                
                const memberList = membersObj.data;
                const attendanceList = attendanceObj.data;

                const selectEl = document.getElementById('memberSelect');
                selectEl.innerHTML = '<option value="">-- 이름을 선택하세요 --</option>';
                
                memberList.forEach(name => {
                    const option = document.createElement('option');
                    option.value = name;
                    option.textContent = name;
                    selectEl.appendChild(option);
                });

                const listEl = document.getElementById('list');
                listEl.innerHTML = '';
                
                const todayStr = new Date(new Date().getTime() + (9 * 60 * 60 * 1000)).toISOString().substring(0, 10);

                const todayPresents = attendanceList
                    .filter(item => item.date.startsWith(todayStr))
                    .map(item => item.name);

                memberList.forEach(name => {
                    const li = document.createElement('li');
                    if (todayPresents.includes(name)) {
                        const targetTime = attendanceList.find(item => item.name === name && item.date.startsWith(todayStr)).date.substring(11, 19);
                        li.innerHTML = `<span class="present">[출석완료] ${name} (${targetTime})</span>`;
                    } else {
                        li.innerHTML = `<span class="absent">[미출석] ${name}</span>`;
                    }
                    listEl.appendChild(li);
                });

            } catch (error) {
                console.error('초기화 실패:', error);
                alert('데이터를 불러오지 못했습니다. 파일명과 OWNER/REPO 설정을 확인하세요.');
            }
        }

        // 출석 체크 실행 함수
        async function checkAttendance() {
            const inputPassword = document.getElementById('password').value;
            const name = document.getElementById('memberSelect').value;

            // 비밀번호 검증
            if (!inputPassword) {
                alert('비밀번호를 입력해주세요!');
                return;
            }
            if (inputPassword !== CLASS_PASSWORD) {
                alert('비밀번호가 틀렸습니다!');
                return;
            }
            if (!name) {
                alert('명단에서 이름을 선택해주세요!');
                return;
            }

            try {
                // 비밀번호가 맞으면 내부에서 토큰을 디코딩하여 사용
                const githubToken = atob(ENCODED_GITHUB_TOKEN);

                const { data: currentData, sha } = await fetchGitHubFile(ATTENDANCE_FILE);

                const now = new Date();
                const kstTime = new Date(now.getTime() + (9 * 60 * 60 * 1000)).toISOString().replace('T', ' ').substring(0, 19);
                const todayStr = kstTime.substring(0, 10);

                const isAlreadyPresent = currentData.some(item => item.name === name && item.date.startsWith(todayStr));
                if (isAlreadyPresent) {
                    alert(`${name}님은 오늘 이미 출석하셨습니다!`);
                    return;
                }

                currentData.push({ name: name, date: kstTime });

                const updateRes = await fetch(baseApiUrl + ATTENDANCE_FILE, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${githubToken}`, // 복호화된 토큰 사용
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `📢 [출석] ${name} (${kstTime})`,
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(currentData, null, 2)))),
                        sha: sha
                    })
                });

                if (updateRes.status === 200 || updateRes.status === 201) {
                    alert(`${name}님, 오늘 출석이 완료되었습니다!`);
                    document.getElementById('password').value = ''; // 입력창 비우기
                    init(); 
                } else {
                    alert('출석 저장 실패! 토큰 설정이나 권한을 확인하세요.');
                }

            } catch (error) {
                console.error(error);
                alert('오류가 발생했습니다. 콘솔 창을 확인하세요.');
            }
        }

        init();
    </script>
</body>
</html>
